<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>LeylaparisDev | Roblox Gameplays</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
            padding: 16px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* Tarjeta del canal */
        .channel-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 24px 20px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .channel-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin: 0 auto 12px;
            overflow: hidden;
            background: linear-gradient(135deg, #FF0000, #CC0000);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .channel-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .channel-name {
            font-size: 22px;
            font-weight: bold;
        }

        .channel-handle {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 12px;
        }

        /* Botón suscribirse */
        .subscribe-btn {
            background: linear-gradient(135deg, #FF0000, #CC0000);
            border: none;
            padding: 10px 24px;
            border-radius: 50px;
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 8px 0;
        }

        .subscribe-btn:hover {
            transform: scale(1.02);
        }

        /* Estadísticas */
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 40px;
            padding: 5px 14px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Reproductor */
        .player-section {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .player-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
        }

        .player-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .player-info {
            margin-top: 12px;
            text-align: center;
        }

        .player-title {
            font-size: 15px;
            font-weight: 600;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .tab {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 10px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .tab.active {
            background: #FF0000;
        }

        /* Lista de videos (scroll) */
        .videos-scroll {
            max-height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 4px;
        }

        .videos-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .videos-scroll::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .videos-scroll::-webkit-scrollbar-thumb {
            background: #FF0000;
            border-radius: 10px;
        }

        .video-item {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            display: flex;
            gap: 12px;
            padding: 8px;
            transition: 0.2s;
        }

        .video-item:hover {
            background: rgba(255, 0, 0, 0.2);
            transform: translateX(4px);
        }

        .video-item.active {
            background: rgba(255, 0, 0, 0.3);
            border-left: 3px solid #FF0000;
        }

        .video-thumb {
            width: 100px;
            height: 56px;
            border-radius: 10px;
            background-size: cover;
            background-position: center;
            background-color: #1a1a2e;
            flex-shrink: 0;
        }

        .video-info {
            flex: 1;
        }

        .video-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .video-meta {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Sección */
        .section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 17px;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Redes */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: 16px 0;
        }

        .social-btn {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            font-size: 20px;
            transition: 0.2s;
        }

        .social-btn:hover {
            background: #FF0000;
            transform: translateY(-2px);
        }

        .footer {
            text-align: center;
            padding: 16px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Tarjeta del canal -->
        <div class="channel-card">
            <div class="channel-avatar" id="avatarContainer">
                <img id="avatarImg" src="https://yt3.googleusercontent.com/ytc/AIdro_lmN-4ZgQvK8jR3wX2pFqLmN7oPqRsTuVwXyZ8=s100-c-k-c0x00ffffff-no-rj" alt="Avatar">
            </div>
            <div class="channel-name">LeylaparisDev</div>
            <div class="channel-handle">@LeylaparisX</div>
            
            <button class="subscribe-btn" id="subscribeBtn">
                <i class="fab fa-youtube"></i> Suscribirse
            </button>
            
            <div class="stats-row">
                <div class="stat-item"><i class="fas fa-users"></i> <span id="subCount">26.8K</span></div>
                <div class="stat-item"><i class="fas fa-video"></i> <span id="videoCount">0</span> videos</div>
            </div>
        </div>

        <!-- Reproductor personalizado -->
        <div class="player-section">
            <div class="player-container" id="playerContainer">
                <iframe id="playerFrame" src="https://www.youtube.com/embed/CyvihZUFwSA" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            <div class="player-info">
                <div class="player-title" id="playerTitle">Cargando...</div>
            </div>
        </div>

        <!-- Tabs y lista de videos -->
        <div class="section">
            <div class="tabs">
                <button class="tab active" id="tabVideos">🎬 Videos</button>
                <button class="tab" id="TabShorts">📱 Shorts</button>
            </div>
            <div id="videosList" class="videos-scroll">
                <div style="text-align: center; padding: 20px;">Cargando videos...</div>
            </div>
        </div>

        <!-- Redes sociales -->
        <div class="social-links">
            <a href="https://youtube.com/@LeylaparisX" class="social-btn" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://www.roblox.com/users/9068484646/profile" class="social-btn" target="_blank"><i class="fab fa-roblox"></i></a>
            <a href="#" class="social-btn" id="twitterLink"><i class="fab fa-twitter"></i></a>
            <a href="#" class="social-btn" id="instagramLink"><i class="fab fa-instagram"></i></a>
            <a href="#" class="social-btn" id="discordLink"><i class="fab fa-discord"></i></a>
        </div>

        <div class="footer">
            <p>© 2026 LeylaparisDev · Todos los derechos reservados</p>
            <p style="margin-top: 6px;">🎮 Gameplays de Roblox | Murder Mystery 2</p>
        </div>
    </div>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script>
        // ========== DATOS DE VIDEOS (extraídos de tus enlaces) ==========
        const VIDEOS = [
            {
                id: "CyvihZUFwSA",
                title: "Mi mejor partida en Murder Mystery 2 🏆💖 | MM2 | PARTE 2",
                views: "57",
                date: "2026-04-25",
                type: "video"
            },
            {
                id: "l1NXa6uXU4Q",
                title: "Mi mejor partida en Murder Mystery 2 🏆💖 | MM2 | PARTE 1",
                views: "1,156",
                date: "2026-03-22",
                type: "video"
            },
            {
                id: "AJQxaNal_9M",
                title: "Beyoncé Jajajaja #roblox #humor #viral #apoyo",
                views: "471",
                date: "2026-02-15",
                type: "video"
            }
        ];

        const SHORTS = [
            { id: "kUN9IOgA2Go", title: "Short #1", views: "—", type: "short" },
            { id: "u_7WvQDfewA", title: "Short #2", views: "—", type: "short" },
            { id: "SaWybfvAnxg", title: "Short #3", views: "—", type: "short" },
            { id: "Ab4EkCFbG4A", title: "Short #4", views: "—", type: "short" },
            { id: "xqfAg1dLcuk", title: "Short #5", views: "—", type: "short" },
            { id: "IgJkW6WbaEg", title: "Short #6", views: "—", type: "short" },
            { id: "VD-NV0povxY", title: "Short #7", views: "—", type: "short" },
            { id: "PaM_0YjS0lY", title: "Short #8", views: "—", type: "short" },
            { id: "O2kN-0yuEpc", title: "Short #9", views: "—", type: "short" },
            { id: "N33K36qmZJI", title: "Short #10", views: "—", type: "short" },
            { id: "GTEm85Ld3Jo", title: "Short #11", views: "—", type: "short" },
            { id: "__E651g9Zps", title: "Short #12", views: "—", type: "short" },
            { id: "3iurJ_GnHI0", title: "ja😂 #roblox #humor", views: "2,060", type: "short" },
            { id: "i7nIgQoEpeI", title: "Short #14", views: "—", type: "short" },
            { id: "pZd4k708pk4", title: "Short #15", views: "717", type: "short" },
            { id: "J6W3hY5Pt1Q", title: "Short #16", views: "—", type: "short" },
            { id: "1GbFwGPQDyA", title: "Short #17", views: "—", type: "short" },
            { id: "umHrcCXEpu0", title: "Short #18", views: "—", type: "short" }
        ];

        let currentList = "video";
        let allItems = [];

        // Combinar y ordenar
        function buildList() {
            allItems = [
                ...VIDEOS.map(v => ({ ...v, type: "video" })),
                ...SHORTS.map(s => ({ ...s, type: "short" }))
            ];
            document.getElementById("videoCount").innerText = allItems.length;
        }

        // Renderizar lista
        function renderList() {
            const container = document.getElementById("videosList");
            const filtered = allItems.filter(item => currentList === "video" ? item.type === "video" : item.type === "short");
            
            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 20px;">No hay elementos</div>';
                return;
            }

            container.innerHTML = filtered.map(item => `
                <div class="video-item" data-id="${item.id}" data-type="${item.type}">
                    <div class="video-thumb" style="background-image: url('https://img.youtube.com/vi/${item.id}/mqdefault.jpg'); background-size: cover;"></div>
                    <div class="video-info">
                        <div class="video-title">${item.title.length > 50 ? item.title.substring(0, 50) + "..." : item.title}</div>
                        <div class="video-meta"><i class="fab fa-youtube"></i> ${item.views !== "—" ? item.views + " vistas" : "Ver en YouTube"}</div>
                    </div>
                </div>
            `).join("");

            // Agregar eventos de clic
            document.querySelectorAll(".video-item").forEach(el => {
                el.addEventListener("click", () => {
                    const id = el.getAttribute("data-id");
                    const type = el.getAttribute("data-type");
                    playVideo(id, type);
                    
                    // Resaltar elemento activo
                    document.querySelectorAll(".video-item").forEach(i => i.classList.remove("active"));
                    el.classList.add("active");
                });
            });
        }

        // Reproductor
        function playVideo(videoId, type) {
            const playerFrame = document.getElementById("playerFrame");
            const playerTitle = document.getElementById("playerTitle");
            const video = allItems.find(v => v.id === videoId);
            
            if (video) playerTitle.innerText = video.title;
            else playerTitle.innerText = "Reproduciendo...";
            
            if (type === "short") {
                playerFrame.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
            } else {
                playerFrame.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
            }
        }

        // Cambiar pestaña
        function setTab(tab) {
            currentList = tab;
            document.getElementById("tabVideos").classList.toggle("active", tab === "video");
            document.getElementById("TabShorts").classList.toggle("active", tab === "short");
            renderList();
        }

        // ========== INICIALIZAR ==========
        buildList();
        renderList();
        setTab("video");
        
        // Eventos de pestañas
        document.getElementById("tabVideos").addEventListener("click", () => setTab("video"));
        document.getElementById("TabShorts").addEventListener("click", () => setTab("short"));
        
        // Botón suscribirse
        document.getElementById("subscribeBtn").addEventListener("click", () => {
            window.open("https://youtube.com/@LeylaparisX?sub_confirmation=1", "_blank");
        });
        
        // Redes sociales
        document.getElementById("twitterLink")?.setAttribute("href", "https://twitter.com/intent/user?screen_name=LeylaparisDev");
        document.getElementById("instagramLink")?.setAttribute("href", "https://instagram.com/leylaparisdev");
        document.getElementById("discordLink")?.setAttribute("href", "https://discord.gg/leylaparis");
        
        // Avatar
        const avatarImg = document.getElementById("avatarImg");
        avatarImg.onerror = () => {
            const container = document.getElementById("avatarContainer");
            container.innerHTML = '<span style="font-size: 48px;">🎮</span>';
        };
        
        console.log("✅ Página cargada con", allItems.length, "videos/shorts");
    </script>
</body>
</html>
