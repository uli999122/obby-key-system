<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>LeylaparisDev | Roblox Gameplays</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
            padding: 16px;
        }

        /* Pantalla de carga */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .loading-content {
            text-align: center;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid #FF0000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 18px;
            font-weight: bold;
            color: white;
            letter-spacing: 2px;
        }

        .loading-dots {
            display: inline-block;
            width: 30px;
            text-align: left;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* Tarjeta del canal */
        .channel-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 24px 20px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .channel-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin: 0 auto 12px;
            overflow: hidden;
            background: linear-gradient(135deg, #FF0000, #CC0000);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .channel-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .channel-name {
            font-size: 22px;
            font-weight: bold;
        }

        .channel-handle {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 12px;
        }

        .subscribe-btn {
            background: linear-gradient(135deg, #FF0000, #CC0000);
            border: none;
            padding: 10px 24px;
            border-radius: 50px;
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 8px 0;
        }

        .subscribe-btn:hover {
            transform: scale(1.02);
        }

        .stats-row {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 40px;
            padding: 5px 14px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Reproductor */
        .player-section {
            margin-bottom: 20px;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .player-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #000;
        }

        .player-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .player-info {
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 16px;
        }

        .player-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .player-stats {
            font-size: 11px;
            color: #aaa;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .tab {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 10px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .tab.active {
            background: #FF0000;
        }

        /* Lista de videos (scroll) */
        .videos-scroll {
            max-height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 4px;
        }

        .videos-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .videos-scroll::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .videos-scroll::-webkit-scrollbar-thumb {
            background: #FF0000;
            border-radius: 10px;
        }

        .video-item {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            display: flex;
            gap: 12px;
            padding: 8px;
            transition: all 0.3s ease;
        }

        .video-item:hover {
            background: rgba(255, 0, 0, 0.2);
            transform: translateX(4px);
        }

        .video-item.active {
            background: rgba(255, 0, 0, 0.3);
            border-left: 3px solid #FF0000;
        }

        .video-thumb {
            width: 100px;
            height: 56px;
            border-radius: 10px;
            background-size: cover;
            background-position: center;
            background-color: #1a1a2e;
            flex-shrink: 0;
        }

        .video-info {
            flex: 1;
        }

        .video-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .video-meta {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
        }

        .section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
        }

        /* Redes */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: 16px 0;
        }

        .social-btn {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            font-size: 20px;
            transition: 0.2s;
        }

        .social-btn:hover {
            background: #FF0000;
            transform: translateY(-2px);
        }

        .footer {
            text-align: center;
            padding: 16px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 16px;
        }

        /* Animación de fade-in */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }
    </style>
</head>
<body>
    <!-- Pantalla de carga -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text">
                Cargando<span class="loading-dots" id="loadingDots">...</span>
            </div>
        </div>
    </div>

    <div class="container" id="mainContainer">
        <!-- Tarjeta del canal -->
        <div class="channel-card">
            <div class="channel-avatar" id="avatarContainer">
                <img id="avatarImg" src="https://yt3.googleusercontent.com/ytc/AIdro_lmN-4ZgQvK8jR3wX2pFqLmN7oPqRsTuVwXyZ8=s100-c-k-c0x00ffffff-no-rj" alt="Avatar">
            </div>
            <div class="channel-name">LeylaparisDev</div>
            <div class="channel-handle">@LeylaparisX</div>
            
            <button class="subscribe-btn" id="subscribeBtn">
                <i class="fab fa-youtube"></i> Suscribirse
            </button>
            
            <div class="stats-row">
                <div class="stat-item"><i class="fas fa-users"></i> <span id="subCount">26.8K</span></div>
                <div class="stat-item"><i class="fas fa-video"></i> <span id="videoCount">0</span> videos</div>
                <div class="stat-item"><i class="fas fa-eye"></i> 1.2M vistas</div>
            </div>
        </div>

        <!-- Reproductor -->
        <div class="player-section">
            <div class="player-container">
                <iframe id="playerFrame" src="https://www.youtube.com/embed/CyvihZUFwSA" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            <div class="player-info">
                <div class="player-title" id="playerTitle">Mi mejor partida en Murder Mystery 2 🏆💖 | MM2 | PARTE 2</div>
                <div class="player-stats" id="playerStats">57 vistas • 26 abr 2026</div>
            </div>
        </div>

        <!-- Tabs y lista de videos -->
        <div class="section">
            <div class="tabs">
                <button class="tab active" id="tabVideos">🎬 Videos</button>
                <button class="tab" id="TabShorts">📱 Shorts</button>
            </div>
            <div id="videosList" class="videos-scroll">
                <div style="text-align: center; padding: 20px;">Cargando videos...</div>
            </div>
        </div>

        <!-- Redes sociales -->
        <div class="social-links">
            <a href="https://youtube.com/@LeylaparisX" class="social-btn" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://www.roblox.com/es/users/8481186202/profile" class="social-btn" target="_blank"><i class="fab fa-roblox"></i></a>
            <a href="https://www.instagram.com/leylaparisx/" class="social-btn" target="_blank"><i class="fab fa-instagram"></i></a>
        </div>

        <div class="footer">
            <p>© 2026 LeylaparisDev · Todos los derechos reservados</p>
            <p style="margin-top: 6px;">🎮 Gameplays de Roblox | Murder Mystery 2</p>
        </div>
    </div>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script>
        // ========== BASE DE DATOS DE VIDEOS ==========
        const VIDEOS = [
            { id: "CyvihZUFwSA", title: "Mi mejor partida en Murder Mystery 2 🏆💖 | MM2 | PARTE 2", views: "57", date: "2026-04-25", type: "video" },
            { id: "l1NXa6uXU4Q", title: "Mi mejor partida en Murder Mystery 2 🏆💖 | MM2 | PARTE 1", views: "1,156", date: "2026-03-22", type: "video" },
            { id: "AJQxaNal_9M", title: "Beyoncé Jajajaja #roblox #humor #viral #apoyo", views: "471", date: "2026-02-15", type: "video" }
        ];

        const SHORTS = [
            { id: "1GbFwGPQDyA", title: "Short divertido #1", views: "—", type: "short" },
            { id: "LNt2LO28OvQ", title: "Short divertido #2", views: "—", type: "short" },
            { id: "U5heFrFgquk", title: "Short divertido #3", views: "—", type: "short" },
            { id: "nBHcgrsCy4A", title: "Short divertido #4", views: "—", type: "short" },
            { id: "Og5NFqKLDB4", title: "Short divertido #5", views: "—", type: "short" },
            { id: "dFiBV8uI9HM", title: "Short divertido #6", views: "—", type: "short" },
            { id: "iOvvRd7RYQI", title: "Short divertido #7", views: "—", type: "short" },
            { id: "NaBiNRbTuJs", title: "Short divertido #8", views: "—", type: "short" },
            { id: "oyMiXqrjNvM", title: "Short divertido #9", views: "—", type: "short" },
            { id: "cY7wuJ17G6k", title: "Short divertido #10", views: "—", type: "short" },
            { id: "8L_SRUF6lbY", title: "Short divertido #11", views: "—", type: "short" },
            { id: "KIyh6BeN3-E", title: "Short divertido #12", views: "—", type: "short" },
            { id: "ariyFhY_hIw", title: "Short divertido #13", views: "—", type: "short" },
            { id: "m0NWNcJWT_8", title: "Short divertido #14", views: "—", type: "short" },
            { id: "h0HZ9pb7FY0", title: "Short divertido #15", views: "—", type: "short" },
            { id: "vhM09Tj1vG4", title: "Short divertido #16", views: "—", type: "short" },
            { id: "gEEbDFOS5l0", title: "Short divertido #17", views: "—", type: "short" },
            { id: "f5URFlgEwE4", title: "Short divertido #18", views: "—", type: "short" },
            { id: "f5wtnZe6CAA", title: "Short divertido #19", views: "—", type: "short" },
            { id: "HiQ7fP_lpPs", title: "Short divertido #20", views: "—", type: "short" }
        ];

        let currentList = "video";
        let allItems = [];

        function buildList() {
            allItems = [
                ...VIDEOS.map(v => ({ ...v, type: "video" })),
                ...SHORTS.map(s => ({ ...s, type: "short" }))
            ];
            document.getElementById("videoCount").innerText = allItems.length;
        }

        // Renderizar lista
        function renderList() {
            const container = document.getElementById("videosList");
            const filtered = allItems.filter(item => currentList === "video" ? item.type === "video" : item.type === "short");
            
            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 20px;">No hay elementos</div>';
                return;
            }

            container.innerHTML = filtered.map(item => `
                <div class="video-item" data-id="${item.id}" data-type="${item.type}" data-title="${item.title.replace(/"/g, '&quot;')}" data-views="${item.views}" data-date="${item.date || '2026'}">
                    <div class="video-thumb" style="background-image: url('https://img.youtube.com/vi/${item.id}/mqdefault.jpg'); background-size: cover;"></div>
                    <div class="video-info">
                        <div class="video-title">${item.title.length > 50 ? item.title.substring(0, 50) + "..." : item.title}</div>
                        <div class="video-meta"><i class="fab fa-youtube"></i> ${item.views !== "—" ? item.views + " vistas" : "Ver en YouTube"}</div>
                    </div>
                </div>
            `).join("");

            // Eventos de clic con animación
            document.querySelectorAll(".video-item").forEach(el => {
                el.addEventListener("click", () => {
                    const id = el.getAttribute("data-id");
                    const title = el.getAttribute("data-title");
                    const views = el.getAttribute("data-views");
                    const date = el.getAttribute("data-date");
                    
                    // Animación de fade-out antes de cambiar el video
                    const playerFrame = document.getElementById("playerFrame");
                    playerFrame.style.opacity = "0.5";
                    setTimeout(() => {
                        playVideo(id, title, views, date);
                        playerFrame.style.opacity = "1";
                    }, 200);
                    
                    // Resaltar elemento activo
                    document.querySelectorAll(".video-item").forEach(i => i.classList.remove("active"));
                    el.classList.add("active");
                });
            });
        }

        // Reproducir video en el iframe
        function playVideo(videoId, title, views, date) {
            const playerFrame = document.getElementById("playerFrame");
            const playerTitle = document.getElementById("playerTitle");
            const playerStats = document.getElementById("playerStats");
            
            // Cambiar el iframe (reproduce en la página)
            playerFrame.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
            
            // Actualizar información
            playerTitle.innerText = title;
            const formattedDate = date ? new Date(date).toLocaleDateString('es-ES') : "Fecha reciente";
            playerStats.innerHTML = `${views !== "—" ? views + " vistas" : "Nuevo"} • ${formattedDate}`;
        }

        // Cambiar pestaña
        function setTab(tab) {
            currentList = tab;
            document.getElementById("tabVideos").classList.toggle("active", tab === "video");
            document.getElementById("TabShorts").classList.toggle("active", tab === "short");
            renderList();
        }

        // Pantalla de carga
        function hideLoadingScreen() {
            const loadingScreen = document.getElementById("loadingScreen");
            const mainContainer = document.getElementById("mainContainer");
            
            loadingScreen.style.opacity = "0";
            setTimeout(() => {
                loadingScreen.style.display = "none";
                mainContainer.style.opacity = "1";
                mainContainer.classList.add("fade-in");
            }, 500);
        }

        // Animación de los puntos de carga
        function animateLoadingDots() {
            const dotsElement = document.getElementById("loadingDots");
            let dotCount = 0;
            setInterval(() => {
                dotCount = (dotCount + 1) % 4;
                dotsElement.textContent = ".".repeat(dotCount);
            }, 500);
        }

        // ========== INICIALIZAR ==========
        animateLoadingDots();
        buildList();
        renderList();
        setTab("video");
        
        // Simular carga de datos (puedes ajustar el tiempo)
        setTimeout(hideLoadingScreen, 1500);
        
        // Eventos de pestañas
        document.getElementById("tabVideos").addEventListener("click", () => setTab("video"));
        document.getElementById("TabShorts").addEventListener("click", () => setTab("short"));
        
        // Botón suscribirse
        document.getElementById("subscribeBtn").addEventListener("click", () => {
            window.open("https://youtube.com/@LeylaparisX?sub_confirmation=1", "_blank");
        });
        
        // Avatar fallback
        const avatarImg = document.getElementById("avatarImg");
        avatarImg.onerror = () => {
            const container = document.getElementById("avatarContainer");
            container.innerHTML = '<span style="font-size: 48px;">🎮</span>';
        };
        
        console.log("✅ Página cargada con", allItems.length, "videos/shorts");
    </script>
</body>
</html>
