<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>LeylaparisDev · El Rincón de los Gameplays</title>
    <!-- Fuentes modernas -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (iconos) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-gradient-start: #0f0c29;
            --bg-gradient-end: #302b63;
            --card-bg: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.75);
            --accent: #ff0000;
            --accent-hover: #cc0000;
            --border-light: rgba(255, 255, 255, 0.15);
        }

        body.kids-mode {
            --bg-gradient-start: #a0e9ff;
            --bg-gradient-end: #c1f0c1;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-primary: #2d3748;
            --text-secondary: #4a5568;
            --accent: #ff8c00;
            --accent-hover: #e67e22;
            --border-light: rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            color: var(--text-primary);
            min-height: 100vh;
            padding: 24px 20px;
            transition: all 0.3s ease;
        }

        .floating-characters {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .character {
            position: absolute;
            font-size: 36px;
            animation: float 6s infinite ease-in-out;
            opacity: 0.35;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        .channel-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 32px 24px;
            text-align: center;
            margin-bottom: 24px;
            border: 1px solid var(--border-light);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .channel-avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            margin: 0 auto 18px;
            overflow: hidden;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .channel-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .channel-name {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .channel-handle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .subscribe-btn {
            background: var(--accent);
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .subscribe-btn:hover {
            transform: scale(1.02);
            background: var(--accent-hover);
        }

        .mode-badge {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(4px);
            display: inline-block;
            padding: 6px 18px;
            border-radius: 60px;
            font-size: 13px;
            font-weight: 500;
            margin-top: 14px;
        }

        .parental-btn {
            background: #ff4500;
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            margin-top: 16px;
            transition: all 0.2s;
        }

        .parental-btn:hover {
            transform: scale(1.02);
            background: #e63900;
        }

        .player-section {
            margin-bottom: 24px;
            border-radius: 32px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.7);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .player-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
        }

        .player-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .player-info {
            background: rgba(0, 0, 0, 0.6);
            padding: 16px;
        }

        .player-title {
            font-size: 16px;
            font-weight: 600;
        }

        .tabs {
            display: flex;
            gap: 14px;
            margin-bottom: 22px;
        }

        .tab {
            flex: 1;
            background: rgba(255, 255, 255, 0.12);
            border: none;
            padding: 12px;
            border-radius: 100px;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab.active {
            background: var(--accent);
            color: white;
        }

        .video-list-container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 20px;
            border: 1px solid var(--border-light);
            margin-bottom: 24px;
        }

        .videos-scroll {
            max-height: 520px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-right: 6px;
        }

        .videos-scroll::-webkit-scrollbar {
            width: 5px;
        }

        .videos-scroll::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .videos-scroll::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }

        .video-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 24px;
            display: flex;
            gap: 14px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .video-item:hover {
            background: var(--accent);
            transform: translateX(6px);
        }

        .video-thumb {
            width: 110px;
            height: 62px;
            border-radius: 18px;
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
        }

        .video-info {
            flex: 1;
        }

        .video-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .video-meta {
            font-size: 11px;
            opacity: 0.8;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 28px 0 20px;
        }

        .social-btn {
            width: 50px;
            height: 50px;
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text-primary);
            font-size: 24px;
            transition: all 0.2s;
        }

        .social-btn:hover {
            background: var(--accent);
            transform: translateY(-4px);
        }

        .footer {
            text-align: center;
            padding: 24px 20px;
            font-size: 12px;
            opacity: 0.7;
            border-top: 1px solid var(--border-light);
            margin-top: 20px;
        }

        @media (max-width: 550px) {
            body { padding: 16px; }
            .channel-name { font-size: 24px; }
            .video-thumb { width: 90px; height: 52px; }
            .video-title { font-size: 12px; }
        }

        .loading-spinner {
            text-align: center;
            padding: 40px;
        }
    </style>
</head>
<body>

<div class="floating-characters" id="floatingChars"></div>

<div class="container">
    <div class="channel-card">
        <div class="channel-avatar">
            <img id="avatarImg" src="https://yt3.googleusercontent.com/ytc/AIdro_lmN-4ZgQvK8jR3wX2pFqLmN7oPqRsTuVwXyZ8=s100-c-k-c0x00ffffff-no-rj" alt="LeylaparisDev">
        </div>
        <div class="channel-name">LeylaparisDev</div>
        <div class="channel-handle">@LeylaparisX</div>
        <button class="subscribe-btn" id="subscribeBtn"><i class="fab fa-youtube"></i> Suscribirse</button>
        <div id="modeBadge" class="mode-badge">🎒 Modo: Normal</div>
        <div><button class="parental-btn" id="parentalBtn"><i class="fas fa-lock"></i> Control Parental</button></div>
    </div>

    <div class="player-section">
        <div class="player-container">
            <iframe id="playerFrame" src="about:blank" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
        <div class="player-info">
            <div class="player-title" id="playerTitle">🎬 Selecciona un vídeo</div>
        </div>
    </div>

    <div class="video-list-container">
        <div class="tabs">
            <button class="tab active" id="tabVideos">🎥 Videos</button>
            <button class="tab" id="tabShorts">📱 Shorts</button>
        </div>
        <div id="videosContainer" class="videos-scroll">
            <div class="loading-spinner">✨ Cargando últimos videos...</div>
        </div>
    </div>

    <div class="social-links">
        <a href="https://youtube.com/@LeylaparisX" class="social-btn" target="_blank"><i class="fab fa-youtube"></i></a>
        <a href="https://www.roblox.com/es/users/8481186202/profile" class="social-btn" target="_blank"><i class="fab fa-roblox"></i></a>
        <a href="https://www.instagram.com/leylaparisx/" class="social-btn" target="_blank"><i class="fab fa-instagram"></i></a>
    </div>

    <div class="footer">
        <p>✨ El rincón de los gameplays · Roblox · Murder Mystery 2 ✨</p>
        <p>© 2026 LeylaparisDev — Todos los derechos reservados</p>
    </div>
</div>

<script>
    // ==================== 🔐 ENLACE DEL FORMULARIO (YA ACTUALIZADO) ====================
    const PARENTAL_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSevZwHnHVuXzTOED35NrE0jA8DeVVF9mvTvN4QIrCDx2CYnLQ/viewform";

    // IDs de shorts que son seguros para el MODO KIDS
    const KIDS_SHORTS_WHITELIST = [
        "Ab4EkCFbG4A", "xqfAg1dLcuk", "SaWybfvAnxg", "VD-NV0povxY",
        "PaM_0YjS0lY", "3iurJ_GnHI0", "i7nIgQoEpeI"
    ];

    // ==================== VARIABLES GLOBALES ====================
    let isKidsMode = false;
    let currentMediaType = "video";
    let allVideosData = [];

    // ==================== CARGAR VIDEOS DESDE RSS ====================
    async function fetchVideosFromRSS() {
        const CHANNEL_ID = "UC2at4aELEO_fqQ1yU43Ev4Q";
        const RSS_URL = `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://www.youtube.com/feeds/videos.xml?channel_id=${CHANNEL_ID}`)}`;
        try {
            const response = await fetch(RSS_URL);
            const data = await response.text();
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(data, "text/xml");
            const entries = xmlDoc.querySelectorAll("entry");
            allVideosData = [];

            for (let entry of entries) {
                let videoId = entry.querySelector("yt\\:videoId")?.textContent || entry.querySelector("videoId")?.textContent;
                if (!videoId) continue;
                let title = entry.querySelector("title")?.textContent || "Sin título";
                let isShort = false;
                const group = entry.querySelector("media\\:group, group");
                if (group) {
                    let durationSec = group.querySelector("yt\\:duration, duration")?.getAttribute("seconds");
                    if (durationSec && parseInt(durationSec) <= 60) isShort = true;
                }
                allVideosData.push({ id: videoId, title: title, type: isShort ? "short" : "video" });
            }
            console.log(`✅ ${allVideosData.length} videos cargados`);
            renderVideoList();
        } catch (err) {
            console.error("Error al cargar:", err);
            document.getElementById("videosContainer").innerHTML = `<div class="loading-spinner">❌ Error al cargar videos</div>`;
        }
    }

    function getFilteredVideos() {
        if (!isKidsMode) return allVideosData;
        return allVideosData.filter(v => v.type === "short" && KIDS_SHORTS_WHITELIST.includes(v.id));
    }

    function renderVideoList() {
        const container = document.getElementById("videosContainer");
        const filtered = getFilteredVideos().filter(v => currentMediaType === "video" ? v.type === "video" : v.type === "short");

        if (filtered.length === 0) {
            container.innerHTML = `<div class="loading-spinner">✨ No hay contenido en esta categoría ✨</div>`;
            return;
        }

        container.innerHTML = filtered.map(video => `
            <div class="video-item" data-id="${video.id}" data-title="${escapeHtml(video.title)}">
                <div class="video-thumb" style="background-image: url('https://img.youtube.com/vi/${video.id}/mqdefault.jpg');"></div>
                <div class="video-info">
                    <div class="video-title">${video.title.length > 60 ? video.title.substring(0,60)+"…" : video.title}</div>
                    <div class="video-meta"><i class="fab fa-youtube"></i> ${video.type === "short" ? "Short" : "Video"}</div>
                </div>
            </div>
        `).join("");

        document.querySelectorAll(".video-item").forEach(el => {
            el.addEventListener("click", () => {
                const id = el.getAttribute("data-id");
                const title = el.getAttribute("data-title");
                playVideo(id, title);
                document.querySelectorAll(".video-item").forEach(i => i.classList.remove("active"));
                el.classList.add("active");
            });
        });
    }

    function playVideo(videoId, title) {
        const playerFrame = document.getElementById("playerFrame");
        const playerTitle = document.getElementById("playerTitle");
        playerFrame.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
        playerTitle.innerText = title;
    }

    function setKidsMode(enable) {
        isKidsMode = enable;
        if (isKidsMode) {
            document.body.classList.add("kids-mode");
            document.getElementById("modeBadge").innerHTML = "🧸 Modo Kids Activo (contenido seguro)";
            document.getElementById("modeBadge").style.background = "#3b82f6";
            generateFloatingCharacters();
        } else {
            document.body.classList.remove("kids-mode");
            document.getElementById("modeBadge").innerHTML = "🎒 Modo: Normal";
            document.getElementById("modeBadge").style.background = "rgba(0,0,0,0.45)";
            document.getElementById("floatingChars").innerHTML = "";
        }
        renderVideoList();
        const firstVideo = getFilteredVideos().find(v => (currentMediaType === "video" ? v.type === "video" : v.type === "short"));
        if (firstVideo) playVideo(firstVideo.id, firstVideo.title);
    }

    function generateFloatingCharacters() {
        const container = document.getElementById("floatingChars");
        container.innerHTML = "";
        const icons = ["🐶", "🐱", "🐭", "🐹", "🐰", "🦊", "🐻", "🐼", "🐨", "🐸", "🐒", "🐥", "🦄", "⭐", "🌈", "🍭", "🧸", "🎈"];
        for (let i = 0; i < 22; i++) {
            const char = document.createElement("div");
            char.className = "character";
            char.innerText = icons[Math.floor(Math.random() * icons.length)];
            char.style.left = Math.random() * 100 + "%";
            char.style.top = Math.random() * 100 + "%";
            char.style.animationDuration = 4 + Math.random() * 8 + "s";
            char.style.fontSize = 28 + Math.random() * 42 + "px";
            char.style.opacity = 0.3 + Math.random() * 0.5;
            container.appendChild(char);
        }
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ==================== EVENTOS ====================
    document.getElementById("parentalBtn").addEventListener("click", () => {
        window.open(PARENTAL_FORM_URL, "_blank");
        alert("🔐 Se ha abierto el formulario de control parental. Los padres deben rellenarlo para autorizar el modo infantil.\n\nDespués de enviarlo, el administrador del canal verificará la solicitud.");
    });

    document.getElementById("subscribeBtn").addEventListener("click", () => {
        window.open("https://youtube.com/@LeylaparisX?sub_confirmation=1", "_blank");
    });

    document.getElementById("tabVideos").addEventListener("click", () => {
        currentMediaType = "video";
        document.getElementById("tabVideos").classList.add("active");
        document.getElementById("tabShorts").classList.remove("active");
        renderVideoList();
    });

    document.getElementById("tabShorts").addEventListener("click", () => {
        currentMediaType = "short";
        document.getElementById("tabShorts").classList.add("active");
        document.getElementById("tabVideos").classList.remove("active");
        renderVideoList();
    });

    const userAvatar = document.getElementById("avatarImg");
    userAvatar.onerror = () => {
        userAvatar.style.display = "none";
        userAvatar.parentElement.style.background = "linear-gradient(135deg, #ff8c00, #e67e22)";
        userAvatar.parentElement.innerHTML = '<span style="font-size: 48px;">🎮</span>';
    };

    // ==================== INICIAR ====================
    fetchVideosFromRSS();
    setKidsMode(false);
</script>
</body>
</html>
