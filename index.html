<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Creador de APK • Web a App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f172a; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 1.5rem; }
    .card { background: #1e293b; border-radius: 2rem; padding: 2rem 1.8rem; width: 100%; max-width: 550px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8); border: 1px solid #334155; }
    h1 { font-size: 2rem; font-weight: 700; color: #f8fafc; text-align: center; margin-bottom: 0.3rem; letter-spacing: -0.5px; }
    .emoji { font-size: 2.4rem; display: block; text-align: center; margin-bottom: 1rem; }
    .sub { color: #94a3b8; text-align: center; margin-bottom: 2rem; font-size: 0.95rem; }
    label { display: block; color: #cbd5e1; margin-bottom: 0.4rem; font-weight: 500; font-size: 0.9rem; margin-top: 1.2rem; }
    input, textarea { width: 100%; padding: 0.9rem 1rem; background: #0f172a; border: 1px solid #475569; border-radius: 1rem; color: #f1f5f9; font-size: 1rem; outline: none; transition: 0.2s; font-family: inherit; resize: vertical; }
    input:focus, textarea:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.3); }
    .url-hint { font-size: 0.75rem; color: #64748b; margin-top: 0.25rem; }
    .advanced { display: flex; gap: 1.5rem; flex-wrap: wrap; margin-top: 0.8rem; }
    .color-pick { display: flex; align-items: center; gap: 0.5rem; background: #0f172a; border-radius: 1rem; padding: 0.5rem 1rem; border: 1px solid #475569; }
    .color-pick input { width: 40px; height: 40px; padding: 2px; border: none; background: transparent; cursor: pointer; }
    .color-pick span { color: #e2e8f0; font-size: 0.9rem; }
    .icon-row { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    button { width: 100%; margin-top: 2rem; background: #3b82f6; color: white; font-weight: bold; padding: 1rem; border: none; border-radius: 1.2rem; font-size: 1.2rem; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    button:hover:not(:disabled) { background: #2563eb; transform: scale(1.01); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { margin-top: 1.2rem; text-align: center; font-size: 0.9rem; color: #94a3b8; min-height: 25px; word-break: break-word; }
    .error { color: #f87171; }
    .success { color: #4ade80; }
    hr { border: none; border-top: 1px solid #334155; margin: 1.5rem 0 0.5rem; }
    .footer { font-size: 0.7rem; color: #475569; text-align: center; margin-top: 0.8rem; }
  </style>
</head>
<body>
  <div class="card">
    <span class="emoji">📦</span>
    <h1>Web a APK</h1>
    <p class="sub">Convierte cualquier sitio web en una app Android instalable</p>

    <label>🌐 URL del sitio web</label>
    <input type="url" id="url" placeholder="https://tusitio.com" value="" autocomplete="url">
    <div class="url-hint">Debe comenzar con https://</div>

    <label>📛 Nombre de la app</label>
    <input type="text" id="appName" placeholder="Mi App Increíble" maxlength="40">

    <div class="advanced">
      <div class="color-pick">
        <span>🎨 Toolbar</span>
        <input type="color" id="color" value="#3b82f6">
      </div>
    </div>

    <label>🖼️ Icono (URL o elige archivo)</label>
    <div class="icon-row">
      <input type="file" id="iconFile" accept="image/png,image/jpeg,image/webp" style="display:none;">
      <button type="button" id="iconBtn" style="width: auto; padding: 0.7rem 1.2rem; margin:0; background:#334155; font-size:0.9rem;">📁 Seleccionar</button>
      <span id="iconName" style="color:#94a3b8; font-size:0.8rem;">Ningún archivo</span>
    </div>
    <textarea id="iconUrl" placeholder="O pega URL de imagen (PNG/JPG)" rows="1" style="margin-top:0.3rem;"></textarea>

    <button id="generateBtn">⚡ Generar APK</button>
    <div id="status"></div>
    <hr>
    <div class="footer">El APK se genera mediante WebView. Sin anuncios ni rastreo.</div>
  </div>

  <script>
    const urlInput = document.getElementById('url');
    const nameInput = document.getElementById('appName');
    const colorInput = document.getElementById('color');
    const iconFile = document.getElementById('iconFile');
    const iconBtn = document.getElementById('iconBtn');
    const iconName = document.getElementById('iconName');
    const iconUrlInput = document.getElementById('iconUrl');
    const generateBtn = document.getElementById('generateBtn');
    const statusDiv = document.getElementById('status');

    iconBtn.addEventListener('click', () => iconFile.click());
    iconFile.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        iconName.textContent = e.target.files[0].name;
        iconUrlInput.value = ''; 
      } else {
        iconName.textContent = 'Ningún archivo';
      }
    });

    function status(msg, type = '') {
      statusDiv.textContent = msg;
      statusDiv.className = type;
    }

    async function urlToBase64(url) {
      const resp = await fetch(url);
      if (!resp.ok) throw new Error('No se pudo descargar la imagen');
      const blob = await resp.blob();
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    generateBtn.addEventListener('click', async () => {
      let url = urlInput.value.trim();
      const appName = nameInput.value.trim() || 'Mi App';
      const color = colorInput.value;

      if (!url) {
        status('❌ Ingresa una URL', 'error');
        return;
      }
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'https://' + url;
        urlInput.value = url;
      }
      try {
        new URL(url);
      } catch (_) {
        status('❌ URL no válida', 'error');
        return;
      }

      status('⏳ Preparando datos...');
      generateBtn.disabled = true;

      try {
        let iconBase64 = '';
        if (iconFile.files.length > 0) {
          iconBase64 = await fileToBase64(iconFile.files[0]);
        } else if (iconUrlInput.value.trim()) {
          iconBase64 = await urlToBase64(iconUrlInput.value.trim());
        }

        status('📡 Llamando al generador (pwa2apk.com)...');

        const payload = {
          url: url,
          name: appName,
          color: color,
          icon: iconBase64 || undefined
        };

        const response = await fetch('https://api.pwa2apk.com/build', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          const errText = await response.text();
          throw new Error(errText || 'Error del servidor');
        }

        const data = await response.json();
        if (data.downloadUrl) {
          status('✅ APK listo. Descargando...', 'success');
          const a = document.createElement('a');
          a.href = data.downloadUrl;
          a.download = `${appName.replace(/\s+/g, '_')}.apk`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          status('✅ Descarga iniciada. Instala el APK en tu Android.', 'success');
        } else if (data.apkUrl) {
          window.open(data.apkUrl, '_blank');
          status('✅ APK generado (abierto en nueva pestaña)', 'success');
        } else {
          throw new Error('No se recibió enlace de descarga');
        }
      } catch (err) {
        status(`❌ Falló: ${err.message}`, 'error');
        console.error(err);
      } finally {
        generateBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
