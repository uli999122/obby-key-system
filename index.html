<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Navegador Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="browser">

        <!-- Barra de pestañas -->
        <div class="tab-bar" id="tabBar">
            <div class="tab active" data-tab="0">Google</div>
            <!-- Las pestañas nuevas se agregan aquí con JS -->
        </div>

        <!-- Barra superior (URL + controles) -->
        <div class="top-bar">
            <button onclick="goBack()">←</button>
            <button onclick="goForward()">→</button>
            <button onclick="reloadPage()">⟳</button>
            
            <input type="text" id="urlBar" value="https://www.google.com" placeholder="Busca o escribe URL">
            <button onclick="goToUrl()">Ir</button>
            <button onclick="newTab()" class="new-tab-btn">+</button>
        </div>

        <!-- Área de favoritos (rápido acceso) -->
        <div class="favorites">
            <button onclick="goToUrlDirect('https://www.google.com')">🔍 Google</button>
            <button onclick="goToUrlDirect('https://www.youtube.com')">▶ YouTube</button>
            <button onclick="goToUrlDirect('https://roblox.com')">🎮 Roblox</button>
            <button onclick="goToUrlDirect('https://www.tiktok.com')">📱 TikTok</button>
        </div>

        <!-- Vista web -->
        <iframe id="webView" src="https://www.google.com" allowfullscreen></iframe>

        <!-- Botón flotante modo oscuro -->
        <button id="themeToggle" onclick="toggleTheme()">🌙</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
