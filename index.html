<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>LeylaparisDev | Roblox Gameplays</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
            padding: 16px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* Tarjeta del canal */
        .channel-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 24px 20px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .channel-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin: 0 auto 12px;
            overflow: hidden;
            background: linear-gradient(135deg, #FF0000, #CC0000);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .channel-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .channel-name {
            font-size: 22px;
            font-weight: bold;
        }

        .channel-handle {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 12px;
        }

        /* Botón suscribirse */
        .subscribe-btn {
            background: linear-gradient(135deg, #FF0000, #CC0000);
            border: none;
            padding: 10px 24px;
            border-radius: 50px;
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 8px 0;
        }

        .subscribe-btn:hover {
            transform: scale(1.02);
        }

        /* Estadísticas */
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 40px;
            padding: 5px 14px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Reproductor Personalizado */
        .custom-player {
            background: #000000cc;
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 24px;
            backdrop-filter: blur(8px);
        }

        .player-thumbnail {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background-size: cover;
            background-position: center;
            cursor: pointer;
        }

        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .play-overlay:hover {
            background: rgba(0, 0, 0, 0.2);
        }

        .play-button {
            width: 70px;
            height: 70px;
            background: #FF0000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            transition: 0.2s;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .play-button:hover {
            transform: scale(1.05);
            background: #cc0000;
        }

        .player-info {
            padding: 16px;
        }

        .player-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .player-stats {
            font-size: 12px;
            color: #aaa;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .tab {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 10px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .tab.active {
            background: #FF0000;
        }

        /* Lista de videos (scroll) */
        .videos-scroll {
            max-height: 450px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 4px;
        }

        .videos-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .videos-scroll::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .videos-scroll::-webkit-scrollbar-thumb {
            background: #FF0000;
            border-radius: 10px;
        }

        .video-item {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            display: flex;
            gap: 12px;
            padding: 8px;
            transition: 0.2s;
        }

        .video-item:hover {
            background: rgba(255, 0, 0, 0.2);
            transform: translateX(4px);
        }

        .video-item.active {
            background: rgba(255, 0, 0, 0.3);
            border-left: 3px solid #FF0000;
        }

        .video-thumb {
            width: 100px;
            height: 56px;
            border-radius: 10px;
            background-size: cover;
            background-position: center;
            background-color: #1a1a2e;
            flex-shrink: 0;
        }

        .video-info {
            flex: 1;
        }

        .video-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .video-meta {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Sección */
        .section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 17px;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Redes */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: 16px 0;
        }

        .social-btn {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            font-size: 20px;
            transition: 0.2s;
        }

        .social-btn:hover {
            background: #FF0000;
            transform: translateY(-2px);
        }

        .footer {
            text-align: center;
            padding: 16px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Tarjeta del canal -->
        <div class="channel-card">
            <div class="channel-avatar" id="avatarContainer">
                <img id="avatarImg" src="https://yt3.googleusercontent.com/ytc/AIdro_lmN-4ZgQvK8jR3wX2pFqLmN7oPqRsTuVwXyZ8=s100-c-k-c0x00ffffff-no-rj" alt="Avatar">
            </div>
            <div class="channel-name">LeylaparisDev</div>
            <div class="channel-handle">@LeylaparisX</div>
            
            <button class="subscribe-btn" id="subscribeBtn">
                <i class="fab fa-youtube"></i> Suscribirse
            </button>
            
            <div class="stats-row">
                <div class="stat-item"><i class="fas fa-users"></i> <span id="subCount">26.8K</span></div>
                <div class="stat-item"><i class="fas fa-video"></i> <span id="videoCount">0</span> videos</div>
                <div class="stat-item"><i class="fas fa-eye"></i> 1.2M vistas</div>
            </div>
        </div>

        <!-- Reproductor Personalizado -->
        <div class="custom-player">
            <div id="playerThumbnail" class="player-thumbnail" style="background-image: url('https://img.youtube.com/vi/CyvihZUFwSA/maxresdefault.jpg');">
                <div class="play-overlay" id="playButton">
                    <div class="play-button">
                        <i class="fas fa-play"></i>
                    </div>
                </div>
            </div>
            <div class="player-info">
                <div class="player-title" id="playerTitle">Mi mejor partida en Murder Mystery 2 🏆💖 | MM2 | PARTE 2</div>
                <div class="player-stats" id="playerStats">57 vistas • 26 abr 2026</div>
            </div>
        </div>

        <!-- Tabs y lista de videos -->
        <div class="section">
            <div class="tabs">
                <button class="tab active" id="tabVideos">🎬 Videos</button>
                <button class="tab" id="TabShorts">📱 Shorts</button>
            </div>
            <div id="videosList" class="videos-scroll">
                <div style="text-align: center; padding: 20px;">Cargando videos...</div>
            </div>
        </div>

        <!-- Redes sociales -->
        <div class="social-links">
            <a href="https://youtube.com/@LeylaparisX" class="social-btn" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://www.roblox.com/es/users/8481186202/profile" class="social-btn" target="_blank"><i class="fab fa-roblox"></i></a>
            <a href="https://www.instagram.com/leylaparisx/" class="social-btn" target="_blank"><i class="fab fa-instagram"></i></a>
        </div>

        <div class="footer">
            <p>© 2026 LeylaparisDev · Todos los derechos reservados</p>
            <p style="margin-top: 6px;">🎮 Gameplays de Roblox | Murder Mystery 2</p>
        </div>
    </div>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script>
        // ========== BASE DE DATOS DE VIDEOS (TUS ENLACES REALES) ==========
        const VIDEOS = [
            { id: "CyvihZUFwSA", title: "Mi mejor partida en Murder Mystery 2 🏆💖 | MM2 | PARTE 2", views: "57", date: "2026-04-25", type: "video" },
            { id: "l1NXa6uXU4Q", title: "Mi mejor partida en Murder Mystery 2 🏆💖 | MM2 | PARTE 1", views: "1,156", date: "2026-03-22", type: "video" },
            { id: "AJQxaNal_9M", title: "Beyoncé Jajajaja #roblox #humor #viral #apoyo", views: "471", date: "2026-02-15", type: "video" }
        ];

        const SHORTS = [
            { id: "1GbFwGPQDyA", title: "Short divertido #1", views: "—", type: "short" },
            { id: "LNt2LO28OvQ", title: "Short divertido #2", views: "—", type: "short" },
            { id: "U5heFrFgquk", title: "Short divertido #3", views: "—", type: "short" },
            { id: "nBHcgrsCy4A", title: "Short divertido #4", views: "—", type: "short" },
            { id: "Og5NFqKLDB4", title: "Short divertido #5", views: "—", type: "short" },
            { id: "dFiBV8uI9HM", title: "Short divertido #6", views: "—", type: "short" },
            { id: "iOvvRd7RYQI", title: "Short divertido #7", views: "—", type: "short" },
            { id: "NaBiNRbTuJs", title: "Short divertido #8", views: "—", type: "short" },
            { id: "oyMiXqrjNvM", title: "Short divertido #9", views: "—", type: "short" },
            { id: "cY7wuJ17G6k", title: "Short divertido #10", views: "—", type: "short" },
            { id: "8L_SRUF6lbY", title: "Short divertido #11", views: "—", type: "short" },
            { id: "KIyh6BeN3-E", title: "Short divertido #12", views: "—", type: "short" },
            { id: "ariyFhY_hIw", title: "Short divertido #13", views: "—", type: "short" },
            { id: "m0NWNcJWT_8", title: "Short divertido #14", views: "—", type: "short" },
            { id: "h0HZ9pb7FY0", title: "Short divertido #15", views: "—", type: "short" },
            { id: "vhM09Tj1vG4", title: "Short divertido #16", views: "—", type: "short" },
            { id: "gEEbDFOS5l0", title: "Short divertido #17", views: "—", type: "short" },
            { id: "f5URFlgEwE4", title: "Short divertido #18", views: "—", type: "short" },
            { id: "f5wtnZe6CAA", title: "Short divertido #19", views: "—", type: "short" },
            { id: "HiQ7fP_lpPs", title: "Short divertido #20", views: "—", type: "short" }
        ];

        let currentList = "video";
        let allItems = [];

        // Combinar todos los elementos
        function buildList() {
            allItems = [
                ...VIDEOS.map(v => ({ ...v, type: "video" })),
                ...SHORTS.map(s => ({ ...s, type: "short" }))
            ];
            document.getElementById("videoCount").innerText = allItems.length;
        }

        // Renderizar lista de videos
        function renderList() {
            const container = document.getElementById("videosList");
            const filtered = allItems.filter(item => currentList === "video" ? item.type === "video" : item.type === "short");
            
            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 20px;">No hay elementos</div>';
                return;
            }

            container.innerHTML = filtered.map(item => `
                <div class="video-item" data-id="${item.id}" data-type="${item.type}" data-title="${item.title.replace(/"/g, '&quot;')}" data-views="${item.views}" data-date="${item.date || '2026'}">
                    <div class="video-thumb" style="background-image: url('https://img.youtube.com/vi/${item.id}/mqdefault.jpg'); background-size: cover;"></div>
                    <div class="video-info">
                        <div class="video-title">${item.title.length > 50 ? item.title.substring(0, 50) + "..." : item.title}</div>
                        <div class="video-meta"><i class="fab fa-youtube"></i> ${item.views !== "—" ? item.views + " vistas" : "Ver en YouTube"}</div>
                    </div>
                </div>
            `).join("");

            // Agregar eventos de clic
            document.querySelectorAll(".video-item").forEach(el => {
                el.addEventListener("click", () => {
                    const id = el.getAttribute("data-id");
                    const type = el.getAttribute("data-type");
                    const title = el.getAttribute("data-title");
                    const views = el.getAttribute("data-views");
                    const date = el.getAttribute("data-date");
                    
                    playVideo(id, type, title, views, date);
                    
                    // Resaltar elemento activo
                    document.querySelectorAll(".video-item").forEach(i => i.classList.remove("active"));
                    el.classList.add("active");
                });
            });
        }

        // Función para reproducir video en el reproductor personalizado
        function playVideo(videoId, type, title, views, date) {
            // Actualizar título y estadísticas
            document.getElementById("playerTitle").innerText = title;
            const formattedDate = date ? new Date(date).toLocaleDateString('es-ES') : "Fecha reciente";
            document.getElementById("playerStats").innerHTML = `${views !== "—" ? views + " vistas" : "Nuevo"} • ${formattedDate}`;
            
            // Cambiar la imagen de fondo/miniatura
            const thumbnailUrl = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
            document.getElementById("playerThumbnail").style.backgroundImage = `url('${thumbnailUrl}')`;
            
            // Guardar el ID del video actual para el botón de reproducción
            document.getElementById("playerThumbnail").setAttribute("data-current-id", videoId);
        }

        // Abrir YouTube al hacer clic en el botón de reproducción o en la miniatura
        function setupPlayerEvents() {
            const playerElement = document.getElementById("playerThumbnail");
            const playBtn = document.getElementById("playButton");
            
            const openVideo = () => {
                const videoId = playerElement.getAttribute("data-current-id") || "CyvihZUFwSA";
                window.open(`https://youtube.com/watch?v=${videoId}`, "_blank");
            };
            
            playerElement.addEventListener("click", openVideo);
            playBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                openVideo();
            });
        }

        // Cambiar pestaña
        function setTab(tab) {
            currentList = tab;
            document.getElementById("tabVideos").classList.toggle("active", tab === "video");
            document.getElementById("TabShorts").classList.toggle("active", tab === "short");
            renderList();
        }

        // ========== INICIALIZAR ==========
        buildList();
        renderList();
        setTab("video");
        
        // Configurar el reproductor
        setupPlayerEvents();
        // Establecer el video inicial
        if (VIDEOS.length > 0) {
            const firstVideo = VIDEOS[0];
            playVideo(firstVideo.id, firstVideo.type, firstVideo.title, firstVideo.views, firstVideo.date);
        }
        
        // Eventos de pestañas
        document.getElementById("tabVideos").addEventListener("click", () => setTab("video"));
        document.getElementById("TabShorts").addEventListener("click", () => setTab("short"));
        
        // Botón suscribirse
        document.getElementById("subscribeBtn").addEventListener("click", () => {
            window.open("https://youtube.com/@LeylaparisX?sub_confirmation=1", "_blank");
        });
        
        // Avatar
        const avatarImg = document.getElementById("avatarImg");
        avatarImg.onerror = () => {
            const container = document.getElementById("avatarContainer");
            container.innerHTML = '<span style="font-size: 48px;">🎮</span>';
        };
        
        console.log("✅ Página cargada con", allItems.length, "videos/shorts");
    </script>
</body>
</html>
