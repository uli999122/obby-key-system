<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>LeylaparisDev · Control Parental</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }

        /* Pantalla de verificación por fecha de nacimiento */
        .birth-verification {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            transition: opacity 0.4s ease;
        }

        .birth-card {
            background: rgba(20, 20, 40, 0.95);
            border-radius: 48px;
            padding: 32px 24px;
            text-align: center;
            max-width: 360px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.4);
        }

        .birth-icon {
            font-size: 56px;
            margin-bottom: 16px;
        }

        .birth-card h2 {
            font-size: 26px;
            margin-bottom: 8px;
        }

        .birth-card p {
            font-size: 14px;
            color: #ccc;
            margin-bottom: 20px;
        }

        .birth-input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .birth-input-group label {
            display: block;
            font-size: 13px;
            margin-bottom: 6px;
            color: #ddd;
        }

        .birth-input-group input {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 60px;
            color: white;
            font-size: 16px;
            text-align: center;
        }

        .verify-btn {
            background: #FF0000;
            border: none;
            padding: 14px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }
        .verify-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.05);
        }

        .error-msg {
            color: #ff8888;
            font-size: 12px;
            margin-top: 10px;
        }

        /* Contenido principal (oculto inicialmente) */
        .main-content {
            max-width: 600px;
            margin: 0 auto;
            opacity: 0;
            transition: opacity 0.5s ease;
            display: none;
        }

        /* Tarjeta del canal */
        .channel-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px 20px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .channel-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin: 0 auto 12px;
            overflow: hidden;
            background: linear-gradient(135deg, #FF0000, #CC0000);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .channel-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .channel-name {
            font-size: 22px;
            font-weight: bold;
        }

        .channel-handle {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 12px;
        }

        .subscribe-btn {
            background: linear-gradient(135deg, #FF0000, #CC0000);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 8px 0;
        }

        /* Reproductor */
        .player-section {
            margin-bottom: 20px;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
        }

        .player-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
        }

        .player-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .player-info {
            background: rgba(0, 0, 0, 0.6);
            padding: 12px;
        }

        .player-title {
            font-size: 15px;
            font-weight: 600;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .tab {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 10px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .tab.active {
            background: #FF0000;
        }

        /* Lista scroll */
        .videos-scroll {
            max-height: 420px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 4px;
        }

        .video-item {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 14px;
            display: flex;
            gap: 12px;
            padding: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .video-item:hover {
            background: rgba(255, 0, 0, 0.2);
            transform: translateX(4px);
        }

        .video-thumb {
            width: 100px;
            height: 56px;
            border-radius: 10px;
            background-size: cover;
            background-position: center;
        }

        .video-info {
            flex: 1;
        }

        .video-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: 16px 0;
        }

        .social-btn {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            font-size: 20px;
            transition: 0.2s;
        }

        .social-btn:hover {
            background: #FF0000;
        }

        .footer {
            text-align: center;
            padding: 16px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
        }

        .mode-badge {
            background: #2c3e66;
            display: inline-block;
            padding: 4px 14px;
            border-radius: 50px;
            font-size: 12px;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <!-- PANTALLA DE VERIFICACIÓN POR FECHA DE NACIMIENTO -->
    <div class="birth-verification" id="birthModal">
        <div class="birth-card">
            <div class="birth-icon">👪</div>
            <h2>Control parental</h2>
            <p>Para garantizar una experiencia segura, introduce la fecha de nacimiento del niño o niña.</p>
            <div class="birth-input-group">
                <label>📅 Fecha de nacimiento</label>
                <input type="date" id="birthDate" value="2016-01-01">
            </div>
            <button class="verify-btn" id="verifyBirthBtn">Verificar y acceder</button>
            <div id="errorMsg" class="error-msg"></div>
        </div>
    </div>

    <!-- CONTENIDO PRINCIPAL (se muestra después de verificar la edad) -->
    <div class="main-content" id="mainContent">
        <div class="channel-card">
            <div class="channel-avatar">
                <img id="avatarImg" src="https://yt3.googleusercontent.com/ytc/AIdro_lmN-4ZgQvK8jR3wX2pFqLmN7oPqRsTuVwXyZ8=s100-c-k-c0x00ffffff-no-rj" alt="Avatar">
            </div>
            <div class="channel-name">LeylaparisDev</div>
            <div class="channel-handle">@LeylaparisX</div>
            <button class="subscribe-btn" id="subscribeBtn"><i class="fab fa-youtube"></i> Suscribirse</button>
            <div id="modeIndicator" class="mode-badge">🎒 Cargando modo...</div>
        </div>

        <!-- Reproductor -->
        <div class="player-section">
            <div class="player-container">
                <iframe id="playerFrame" src="about:blank" frameborder="0" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
            </div>
            <div class="player-info">
                <div class="player-title" id="playerTitle">Selecciona un vídeo</div>
            </div>
        </div>

        <!-- Pestañas -->
        <div class="section">
            <div class="tabs">
                <button class="tab active" id="tabVideos">🎬 Videos</button>
                <button class="tab" id="TabShorts">📱 Shorts</button>
            </div>
            <div id="videosList" class="videos-scroll">
                <div style="text-align: center; padding: 20px;">Cargando contenido...</div>
            </div>
        </div>

        <div class="social-links">
            <a href="https://youtube.com/@LeylaparisX" class="social-btn" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://www.roblox.com/es/users/8481186202/profile" class="social-btn" target="_blank"><i class="fab fa-roblox"></i></a>
            <a href="https://www.instagram.com/leylaparisx/" class="social-btn" target="_blank"><i class="fab fa-instagram"></i></a>
        </div>

        <div class="footer">
            <p>© 2026 LeylaparisDev · Control parental activo</p>
        </div>
    </div>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        // ======================== 🔐 CONFIGURACIÓN DE CONTENIDO ========================
        // *** TÚ DECIDES QUÉ VIDEOS/SHORTS SON APTOS PARA NIÑOS (menos de 12 años) ***
        // Los videos que NO estén en la lista KIDS solo se mostrarán para mayores de 12.

        // ---------- VIDEOS NORMALES (NO se muestran en modo Kids) ----------
        const VIDEOS_NORMAL = [
            { id: "CyvihZUFwSA", title: "Mi mejor partida MM2 🏆💖 | PARTE 2", views: "57", type: "video" },
            { id: "l1NXa6uXU4Q", title: "Mi mejor partida MM2 🏆💖 | PARTE 1", views: "1,156", type: "video" },
            { id: "AJQxaNal_9M", title: "Beyoncé Jajajaja #roblox #humor", views: "471", type: "video" }
        ];

        // ---------- VIDEOS KIDS (solo los que son 100% seguros para niños) ----------
        const VIDEOS_KIDS = [
            // Por ahora no hay videos largos en la lista kids, puedes añadir IDs si quieres.
        ];

        // ---------- SHORTS NORMALES (NO se muestran en modo Kids) ----------
        // ⚠️ Aquí están los shorts que están BLOQUEADOS en modo Kids
        const SHORTS_NORMAL = [
            { id: "GTEm85Ld3Jo", title: "Short bloqueado para niños", views: "—", type: "short" },
            { id: "O2kN-0yuEpc", title: "Short bloqueado para niños", views: "—", type: "short" }
        ];

        // ---------- SHORTS KIDS (solo los shorts APTOS para niños) ----------
        // ✅ Aquí están los IDs de los shorts que SÍ se mostrarán en modo Kids
        const SHORTS_KIDS = [
            { id: "Ab4EkCFbG4A", title: "Short divertido para niños", views: "—", type: "short" },
            { id: "xqfAg1dLcuk", title: "Short divertido para niños", views: "—", type: "short" },
            { id: "SaWybfvAnxg", title: "Short divertido para niños", views: "—", type: "short" },
            { id: "VD-NV0povxY", title: "Short divertido para niños", views: "—", type: "short" },
            { id: "PaM_0YjS0lY", title: "Short divertido para niños", views: "—", type: "short" },
            { id: "3iurJ_GnHI0", title: "ja😂 #roblox #humor (Apto para niños)", views: "2,060", type: "short" },
            { id: "i7nIgQoEpeI", title: "Short divertido para niños", views: "—", type: "short" }
        ];


        // ======================== LÓGICA DEL SISTEMA ========================
        let currentAgeMode = null;     // 'kids' o 'normal'
        let currentListType = "video";
        let currentFilteredItems = [];

        function buildFilteredList() {
            if (currentAgeMode === 'kids') {
                // Modo Kids: solo mostrar VIDEOS_KIDS + SHORTS_KIDS
                currentFilteredItems = [
                    ...VIDEOS_KIDS.map(v => ({ ...v, type: "video" })),
                    ...SHORTS_KIDS.map(s => ({ ...s, type: "short" }))
                ];
            } else {
                // Modo Normal (mayores de 12): mostrar TODO el contenido (todo lo que no es kids)
                currentFilteredItems = [
                    ...VIDEOS_NORMAL.map(v => ({ ...v, type: "video" })),
                    ...SHORTS_NORMAL.map(s => ({ ...s, type: "short" }))
                ];
            }
            document.getElementById("videoCount")?.setAttribute("data-count", currentFilteredItems.length);
        }

        function renderList() {
            const container = document.getElementById("videosList");
            const filtered = currentFilteredItems.filter(item => currentListType === "video" ? item.type === "video" : item.type === "short");
            
            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 20px;">✨ No hay contenido en esta categoría ✨</div>';
                return;
            }

            container.innerHTML = filtered.map(item => `
                <div class="video-item" data-id="${item.id}" data-title="${item.title.replace(/"/g, '&quot;')}">
                    <div class="video-thumb" style="background-image: url('https://img.youtube.com/vi/${item.id}/mqdefault.jpg');"></div>
                    <div class="video-info">
                        <div class="video-title">${item.title.length > 50 ? item.title.substring(0,50)+"..." : item.title}</div>
                        <div class="video-meta"><i class="fab fa-youtube"></i> ${item.views !== "—" ? item.views + " vistas" : "Ver ahora"}</div>
                    </div>
                </div>
            `).join("");

            // Eventos de clic
            document.querySelectorAll(".video-item").forEach(el => {
                el.addEventListener("click", () => {
                    const id = el.getAttribute("data-id");
                    const title = el.getAttribute("data-title");
                    playVideo(id, title);
                    document.querySelectorAll(".video-item").forEach(i => i.classList.remove("active"));
                    el.classList.add("active");
                });
            });
        }

        function playVideo(videoId, title) {
            const playerFrame = document.getElementById("playerFrame");
            const playerTitle = document.getElementById("playerTitle");
            playerFrame.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
            playerTitle.innerText = title;
        }

        function setTab(type) {
            currentListType = type;
            document.getElementById("tabVideos").classList.toggle("active", type === "video");
            document.getElementById("TabShorts").classList.toggle("active", type === "short");
            renderList();
        }

        // ======================== CÁLCULO DE EDAD Y VERIFICACIÓN ========================
        function calcularEdad(fechaNacimiento) {
            const hoy = new Date();
            const nacimiento = new Date(fechaNacimiento);
            let edad = hoy.getFullYear() - nacimiento.getFullYear();
            const mesDiff = hoy.getMonth() - nacimiento.getMonth();
            if (mesDiff < 0 || (mesDiff === 0 && hoy.getDate() < nacimiento.getDate())) {
                edad--;
            }
            return edad;
        }

        function iniciarConEdad(fechaNacimiento) {
            const edad = calcularEdad(fechaNacimiento);
            if (edad < 12) {
                currentAgeMode = 'kids';
            } else {
                currentAgeMode = 'normal';
            }

            // Guardar preferencia en localStorage
            localStorage.setItem('userBirthDate', fechaNacimiento);
            localStorage.setItem('userAgeMode', currentAgeMode);

            buildFilteredList();
            renderList();
            setTab("video");
            
            // Cambiar badge visual
            const badge = document.getElementById("modeIndicator");
            if (currentAgeMode === 'kids') {
                badge.innerHTML = "🧸 Modo Kids (contenido seguro)";
                badge.style.background = "#3b82f6";
            } else {
                badge.innerHTML = "🔥 Modo Normal (contenido completo)";
                badge.style.background = "#ef4444";
            }
            
            // Ocultar modal y mostrar contenido
            const modal = document.getElementById("birthModal");
            const mainContent = document.getElementById("mainContent");
            modal.style.opacity = "0";
            setTimeout(() => {
                modal.style.display = "none";
                mainContent.style.display = "block";
                setTimeout(() => mainContent.style.opacity = "1", 50);
                // Cargar el primer video por defecto (si existe)
                if (currentFilteredItems.length > 0) {
                    const first = currentFilteredItems[0];
                    playVideo(first.id, first.title);
                }
            }, 300);
        }

        // ======================== EVENTOS ========================
        document.getElementById("verifyBirthBtn").addEventListener("click", () => {
            const birthDate = document.getElementById("birthDate").value;
            const errorDiv = document.getElementById("errorMsg");
            if (!birthDate) {
                errorDiv.innerText = "❌ Por favor, selecciona una fecha de nacimiento.";
                return;
            }
            const edad = calcularEdad(birthDate);
            if (edad < 0 || edad > 100) {
                errorDiv.innerText = "❌ Fecha no válida.";
                return;
            }
            errorDiv.innerText = "";
            iniciarConEdad(birthDate);
        });

        // Comprobar si ya hay una preferencia guardada
        const savedBirthDate = localStorage.getItem('userBirthDate');
        const savedMode = localStorage.getItem('userAgeMode');
        if (savedBirthDate && savedMode) {
            // Si ya existe, aplicar directamente
            currentAgeMode = savedMode;
            buildFilteredList();
            renderList();
            setTab("video");
            const badge = document.getElementById("modeIndicator");
            if (currentAgeMode === 'kids') {
                badge.innerHTML = "🧸 Modo Kids (contenido seguro)";
                badge.style.background = "#3b82f6";
            } else {
                badge.innerHTML = "🔥 Modo Normal (contenido completo)";
                badge.style.background = "#ef4444";
            }
            document.getElementById("birthModal").style.display = "none";
            document.getElementById("mainContent").style.display = "block";
            document.getElementById("mainContent").style.opacity = "1";
            if (currentFilteredItems.length > 0) {
                const first = currentFilteredItems[0];
                playVideo(first.id, first.title);
            }
        } else {
            document.getElementById("birthModal").style.display = "flex";
        }

        document.getElementById("subscribeBtn").addEventListener("click", () => window.open("https://youtube.com/@LeylaparisX?sub_confirmation=1", "_blank"));
        document.getElementById("tabVideos").addEventListener("click", () => setTab("video"));
        document.getElementById("TabShorts").addEventListener("click", () => setTab("short"));
        
        // Fallback avatar
        const avatarImg = document.getElementById("avatarImg");
        avatarImg.onerror = () => { avatarImg.style.display = 'none'; avatarImg.parentElement.innerHTML = '<span style="font-size: 48px;">🎮</span>'; };
    </script>
</body>
</html>
