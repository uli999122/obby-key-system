<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LeylaparisDev | Roblox Gameplays</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
            padding: 16px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* Tarjeta del canal */
        .channel-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 24px 20px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .channel-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin: 0 auto 12px;
            overflow: hidden;
            background: linear-gradient(135deg, #FF0000, #CC0000);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .channel-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .channel-name {
            font-size: 22px;
            font-weight: bold;
        }

        .channel-handle {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 12px;
        }

        /* Botón suscribirse */
        .subscribe-btn {
            background: linear-gradient(135deg, #FF0000, #CC0000);
            border: none;
            padding: 10px 24px;
            border-radius: 50px;
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 8px 0;
        }

        .subscribe-btn:hover {
            transform: scale(1.02);
        }

        /* Estadísticas */
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 40px;
            padding: 5px 14px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .tab {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 10px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .tab.active {
            background: #FF0000;
        }

        /* Grid de videos */
        .videos-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .video-card {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            display: flex;
            gap: 12px;
            padding: 8px;
            transition: 0.2s;
        }

        .video-card:hover {
            background: rgba(255, 0, 0, 0.2);
        }

        .video-thumb {
            width: 120px;
            height: 68px;
            border-radius: 10px;
            background-size: cover;
            background-position: center;
            background-color: #1a1a2e;
            flex-shrink: 0;
        }

        .video-info {
            flex: 1;
        }

        .video-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .video-meta {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Sección */
        .section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 17px;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Redes */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: 16px 0;
        }

        .social-btn {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            font-size: 20px;
            transition: 0.2s;
        }

        .social-btn:hover {
            background: #FF0000;
            transform: translateY(-2px);
        }

        .footer {
            text-align: center;
            padding: 16px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 16px;
        }

        .loading {
            text-align: center;
            padding: 30px;
            color: rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Tarjeta del canal -->
        <div class="channel-card">
            <div class="channel-avatar" id="avatarContainer">
                <img id="avatarImg" src="https://yt3.googleusercontent.com/ytc/AIdro_lmN-4ZgQvK8jR3wX2pFqLmN7oPqRsTuVwXyZ8=s100-c-k-c0x00ffffff-no-rj" alt="Avatar">
            </div>
            <div class="channel-name">LeylaparisDev</div>
            <div class="channel-handle">@LeylaparisX</div>
            
            <button class="subscribe-btn" id="subscribeBtn">
                <i class="fab fa-youtube"></i> Suscribirse
            </button>
            
            <div class="stats-row">
                <div class="stat-item"><i class="fas fa-users"></i> <span id="subCount">--</span></div>
                <div class="stat-item"><i class="fas fa-video"></i> <span id="videoCount">--</span> videos</div>
            </div>
        </div>

        <!-- Videos -->
        <div class="section">
            <div class="tabs">
                <button class="tab active" id="tabVideos">📹 Videos</button>
                <button class="tab" id="tabShorts">📱 Shorts</button>
            </div>
            <div id="videosList" class="videos-grid">
                <div class="loading">🎬 Cargando videos...</div>
            </div>
        </div>

        <!-- Redes sociales -->
        <div class="social-links">
            <a href="https://youtube.com/@LeylaparisX" class="social-btn" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://www.roblox.com/users/9068484646/profile" class="social-btn" target="_blank"><i class="fab fa-roblox"></i></a>
            <a href="#" class="social-btn" id="twitterLink"><i class="fab fa-twitter"></i></a>
            <a href="#" class="social-btn" id="instagramLink"><i class="fab fa-instagram"></i></a>
            <a href="#" class="social-btn" id="discordLink"><i class="fab fa-discord"></i></a>
        </div>

        <div class="footer">
            <p>© 2026 LeylaparisDev · Todos los derechos reservados</p>
            <p style="margin-top: 6px;">🎮 Gameplays de Roblox | Murder Mystery 2</p>
        </div>
    </div>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script>
        // ========== DATOS DEL CANAL ==========
        const CHANNEL_ID = "UC2at4aELEO_fqQ1yU43Ev4Q";
        const CHANNEL_URL = `https://www.youtube.com/channel/${CHANNEL_ID}`;
        const SUBSCRIBE_URL = `https://www.youtube.com/channel/${CHANNEL_ID}?sub_confirmation=1`;
        
        let allVideos = [];
        let currentTab = "video";
        
        // ========== OBTENER DATOS DESDE RSS DE YOUTUBE (SIN API KEY) ==========
        async function fetchYouTubeData() {
            const videosList = document.getElementById("videosList");
            videosList.innerHTML = '<div class="loading">🎬 Cargando videos...</div>';
            
            try {
                // Obtener videos del canal via RSS
                const rssUrl = `https://www.youtube.com/feeds/videos.xml?channel_id=${CHANNEL_ID}`;
                const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(rssUrl)}`;
                
                const response = await fetch(proxyUrl);
                const text = await response.text();
                
                // Parsear XML
                const parser = new DOMParser();
                const xml = parser.parseFromString(text, "text/xml");
                const entries = xml.querySelectorAll("entry");
                
                const videos = [];
                let videoCount = 0;
                
                for (let i = 0; i < entries.length; i++) {
                    const entry = entries[i];
                    
                    // Obtener ID del video
                    let videoId = null;
                    const videoIdElem = entry.querySelector("yt\\:videoId");
                    if (videoIdElem) videoId = videoIdElem.textContent;
                    if (!videoId) videoId = entry.querySelector("videoId")?.textContent;
                    
                    const title = entry.querySelector("title")?.textContent || "Sin título";
                    const published = entry.querySelector("published")?.textContent;
                    const author = entry.querySelector("author name")?.textContent;
                    
                    // Determinar si es short (por duración o título)
                    let isShort = false;
                    const group = entry.querySelector("media\\:group, group");
                    if (group) {
                        const durationElem = group.querySelector("yt\\:duration, duration");
                        if (durationElem) {
                            const duration = durationElem.getAttribute("seconds") || durationElem.textContent;
                            if (duration && parseInt(duration) <= 60) isShort = true;
                        }
                    }
                    
                    if (videoId) {
                        videos.push({
                            id: videoId,
                            title: title,
                            thumbnail: `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`,
                            published: published,
                            isShort: isShort,
                            url: `https://youtube.com/watch?v=${videoId}`
                        });
                        videoCount++;
                    }
                }
                
                allVideos = videos;
                
                // Actualizar contador de videos
                document.getElementById("videoCount").innerText = videoCount;
                
                // Obtener suscriptores (aproximado desde el canal)
                try {
                    const channelRss = `https://www.youtube.com/feeds/videos.xml?channel_id=${CHANNEL_ID}`;
                    const channelResponse = await fetch(channelRss);
                    const channelText = await channelResponse.text();
                    const channelXml = parser.parseFromString(channelText, "text/xml");
                    const titleElem = channelXml.querySelector("title");
                    if (titleElem) {
                        const fullTitle = titleElem.textContent;
                        const match = fullTitle.match(/(\d+(?:\.\d+)?[KMB]?)/i);
                        if (match) document.getElementById("subCount").innerHTML = match[1];
                        else document.getElementById("subCount").innerHTML = "26.8K";
                    }
                } catch(e) {
                    document.getElementById("subCount").innerHTML = "26.8K";
                }
                
                renderVideos();
                
            } catch (error) {
                console.error("Error cargando videos:", error);
                videosList.innerHTML = '<div class="loading">⚠️ Error al cargar videos. Los datos se mostrarán manualmente.</div>';
                // Datos de respaldo (manuales)
                loadManualVideos();
            }
        }
        
        // ========== DATOS MANUALES (por si falla el RSS) ==========
        function loadManualVideos() {
            allVideos = [
                { id: "dQw4w9WgXcQ", title: "¡NADIE sospechaba de MÍ! 🔪 | Murder Mystery 2", thumbnail: "https://img.youtube.com/vi/dQw4w9WgXcQ/mqdefault.jpg", isShort: false, url: "https://youtube.com/watch?v=dQw4w9WgXcQ" },
                { id: "dQw4w9WgXcQ", title: "Mi mejor partida en Murder Mystery 2 🏆💖 | PARTE 2", thumbnail: "https://img.youtube.com/vi/dQw4w9WgXcQ/mqdefault.jpg", isShort: false, url: "https://youtube.com/watch?v=dQw4w9WgXcQ" },
                { id: "dQw4w9WgXcQ", title: "Mi mejor partida en Murder Mystery 2 🏆💖 | PARTE 1", thumbnail: "https://img.youtube.com/vi/dQw4w9WgXcQ/mqdefault.jpg", isShort: false, url: "https://youtube.com/watch?v=dQw4w9WgXcQ" },
                { id: "dQw4w9WgXcQ", title: "Beyoncé Jajajaja #roblox #humor #viral", thumbnail: "https://img.youtube.com/vi/dQw4w9WgXcQ/mqdefault.jpg", isShort: true, url: "https://youtube.com/watch?v=dQw4w9WgXcQ" }
            ];
            document.getElementById("videoCount").innerText = allVideos.length;
            document.getElementById("subCount").innerHTML = "26.8K";
            renderVideos();
        }
        
        // ========== RENDERIZAR VIDEOS ==========
        function renderVideos() {
            const container = document.getElementById("videosList");
            const filtered = allVideos.filter(v => currentTab === "video" ? !v.isShort : v.isShort);
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="loading">📺 No hay ' + (currentTab === "video" ? "videos" : "shorts") + ' disponibles</div>';
                return;
            }
            
            container.innerHTML = filtered.map(video => `
                <div class="video-card" onclick="window.open('${video.url}', '_blank')">
                    <div class="video-thumb" style="background-image: url('${video.thumbnail}'); background-size: cover;"></div>
                    <div class="video-info">
                        <div class="video-title">${video.title.length > 60 ? video.title.substring(0, 60) + "..." : video.title}</div>
                        <div class="video-meta"><i class="fab fa-youtube"></i> Ver en YouTube</div>
                    </div>
                </div>
            `).join("");
        }
        
        // ========== TABS ==========
        document.getElementById("tabVideos").addEventListener("click", () => {
            currentTab = "video";
            document.getElementById("tabVideos").classList.add("active");
            document.getElementById("tabShorts").classList.remove("active");
            renderVideos();
        });
        
        document.getElementById("tabShorts").addEventListener("click", () => {
            currentTab = "short";
            document.getElementById("tabShorts").classList.add("active");
            document.getElementById("tabVideos").classList.remove("active");
            renderVideos();
        });
        
        // ========== BOTÓN SUSCRIBIRSE ==========
        document.getElementById("subscribeBtn").addEventListener("click", () => {
            window.open(SUBSCRIBE_URL, "_blank");
        });
        
        // ========== REDES SOCIALES ==========
        document.getElementById("twitterLink")?.setAttribute("href", "https://twitter.com/intent/user?screen_name=LeylaparisDev");
        document.getElementById("instagramLink")?.setAttribute("href", "https://instagram.com/leylaparisdev");
        document.getElementById("discordLink")?.setAttribute("href", "https://discord.gg/leylaparis");
        
        // ========== FOTO DE PERFIL (URL REAL) ==========
        // Usamos la imagen real del canal de YouTube
        const avatarImg = document.getElementById("avatarImg");
        avatarImg.src = "https://yt3.googleusercontent.com/ytc/AIdro_lmN-4ZgQvK8jR3wX2pFqLmN7oPqRsTuVwXyZ8=s176-c-k-c0x00ffffff-no-rj";
        avatarImg.onerror = () => {
            // Fallback a emoji si no carga
            const container = document.getElementById("avatarContainer");
            container.innerHTML = '<span style="font-size: 48px;">🎮</span>';
        };
        
        // ========== INICIAR ==========
        fetchYouTubeData();
    </script>
</body>
</html>
