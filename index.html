
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>LeylaparisDev | Canal de Roblox y YouTube</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* Tarjeta del canal */
        .channel-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 25px 20px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #FF0000, #CC0000);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 50px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .channel-name {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .channel-handle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 15px;
        }

        /* Botón de suscripción de YouTube (iframe oficial) */
        .subscribe-container {
            margin: 20px auto;
            display: flex;
            justify-content: center;
        }

        .subscribe-iframe {
            border: none;
            overflow: hidden;
            width: 100%;
            max-width: 300px;
            height: 50px;
        }

        /* Videos */
        .videos-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Grid de videos (embed oficial) */
        .videos-embed-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* Proporción 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 16px;
        }

        .videos-embed-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 16px;
        }

        /* Redes sociales */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .social-btn {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            font-size: 22px;
            transition: all 0.3s;
        }

        .social-btn:hover {
            background: #FF0000;
            transform: translateY(-3px);
        }

        .footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }

        .stats-text {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50px;
            padding: 8px 16px;
            display: inline-block;
            margin-top: 10px;
            font-size: 13px;
        }

        @media (max-width: 480px) {
            body { padding: 15px; }
            .channel-name { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Tarjeta del canal -->
        <div class="channel-card">
            <div class="avatar">🎮</div>
            <div class="channel-name">LeylaparisDev</div>
            <div class="channel-handle">@LeylaparisX</div>
            
            <!-- Botón de suscripción OFICIAL de YouTube (iframe, sin API) -->
            <div class="subscribe-container">
                <iframe 
                    class="subscribe-iframe"
                    src="https://www.youtube.com/subscribe_embed?channelid=UC2at4aELEO_fqQ1yU43Ev4Q"
                    scrolling="no"
                    frameborder="0">
                </iframe>
            </div>
            
            <div class="stats-text">
                🎬 128 videos publicados
            </div>
        </div>

        <!-- Últimos videos (embed oficial del canal) -->
        <div class="videos-section">
            <div class="section-title">
                <i class="fab fa-youtube" style="color: #FF0000;"></i>
                Últimos videos
            </div>
            <div class="videos-embed-container">
                <iframe 
                    src="https://www.youtube.com/embed?listType=user_uploads&list=UC2at4aELEO_fqQ1yU43Ev4Q"
                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen>
                </iframe>
            </div>
        </div>

        <!-- Redes sociales -->
        <div class="social-links">
            <a href="https://youtube.com/@LeylaparisX" class="social-btn" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://www.roblox.com/users/9068484646/profile" class="social-btn" target="_blank"><i class="fab fa-roblox"></i></a>
            <a href="#" class="social-btn" id="twitterLink" target="_blank"><i class="fab fa-twitter"></i></a>
            <a href="#" class="social-btn" id="instagramLink" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="#" class="social-btn" id="discordLink" target="_blank"><i class="fab fa-discord"></i></a>
        </div>

        <div class="footer">
            <p>✨ Gameplays de Roblox | Murder Mystery 2 ✨</p>
            <p>📺 Contenido diario | Directos y shorts</p>
            <p style="margin-top: 10px; font-size: 11px;">El contador de suscriptores es automático de YouTube</p>
        </div>
    </div>

    <!-- Font Awesome para íconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script>
        // Actualizar enlaces de redes sociales (pon tus enlaces reales aquí)
        document.getElementById("twitterLink")?.setAttribute("href", "https://twitter.com/tuusuario");
        document.getElementById("instagramLink")?.setAttribute("href", "https://instagram.com/tuusuario");
        document.getElementById("discordLink")?.setAttribute("href", "https://discord.gg/tuservidor");
        
        console.log("✅ Página de LeylaparisDev cargada correctamente");
        console.log("📺 El contador de suscriptores es automático de YouTube, sin necesidad de API");
    </script>
</body>
</html>
