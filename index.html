<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>LeylaparisDev | Canal de Roblox y YouTube</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* Tarjeta del canal */
        .channel-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 25px 20px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #FF0000, #CC0000);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 50px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .channel-name {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .channel-handle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 15px;
        }

        .subscriber-count {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50px;
            padding: 10px 20px;
            display: inline-block;
            margin-bottom: 20px;
        }

        .subscriber-count span {
            font-size: 28px;
            font-weight: bold;
            color: #FF0000;
        }

        .subscribe-btn {
            background: linear-gradient(135deg, #FF0000, #CC0000);
            border: none;
            padding: 14px 30px;
            border-radius: 50px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            width: 100%;
            max-width: 250px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .subscribe-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(255, 0, 0, 0.4);
        }

        /* Videos */
        .videos-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .video-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .video-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 12px;
            display: flex;
            gap: 12px;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        .video-item:hover {
            transform: translateX(5px);
            background: rgba(255, 0, 0, 0.2);
        }

        .video-thumb {
            width: 80px;
            height: 80px;
            background: #333;
            border-radius: 12px;
            background-size: cover;
            background-position: center;
        }

        .video-info {
            flex: 1;
        }

        .video-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .video-stats {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Redes sociales */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .social-btn {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            font-size: 22px;
            transition: all 0.3s;
        }

        .social-btn:hover {
            background: #FF0000;
            transform: translateY(-3px);
        }

        .footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: rgba(255, 255, 255, 0.6);
        }

        @media (max-width: 480px) {
            body { padding: 15px; }
            .channel-name { font-size: 20px; }
            .video-thumb { width: 65px; height: 65px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Tarjeta del canal -->
        <div class="channel-card">
            <div class="avatar">
                🎮
            </div>
            <div class="channel-name">LeylaparisDev</div>
            <div class="channel-handle">@LeylaparisX</div>
            <div class="subscriber-count">
                <span id="subscriberCount">0</span> suscriptores
            </div>
            <button class="subscribe-btn" id="subscribeBtn">
                <i class="fab fa-youtube"></i> Suscribirse
            </button>
        </div>

        <!-- Últimos videos -->
        <div class="videos-section">
            <div class="section-title">
                <i class="fab fa-youtube" style="color: #FF0000;"></i>
                Últimos videos
            </div>
            <div id="videoList" class="video-list">
                <div class="loading">🎬 Cargando videos...</div>
            </div>
        </div>

        <!-- Redes sociales -->
        <div class="social-links">
            <a href="https://youtube.com/@LeylaparisX" class="social-btn" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="#" class="social-btn" id="twitterLink" target="_blank"><i class="fab fa-twitter"></i></a>
            <a href="#" class="social-btn" id="instagramLink" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="#" class="social-btn" id="tiktokLink" target="_blank"><i class="fab fa-tiktok"></i></a>
            <a href="#" class="social-btn" id="discordLink" target="_blank"><i class="fab fa-discord"></i></a>
        </div>

        <div class="footer">
            <p>✨ Mi canal de Roblox y Murder Mystery 2 ✨</p>
            <p>📺 Gameplays, shorts y mucho más</p>
        </div>
    </div>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script>
        // ========== 🔑 COLOQUE AQUÍ SU CLAVE API DE YOUTUBE ==========
        const YOUTUBE_API_KEY = "AIzaSyCUwCz6b-KeTKbYLmc7JC5bbFI_Ca9qQZI";  // <--- PEGA TU API KEY AQUÍ
        // =============================================================
        
        // Datos del canal (ya los tienes)
        const CHANNEL_ID = "UC2at4aELEO_fqQ1yU43Ev4Q";
        const CHANNEL_HANDLE = "@LeylaparisX";
        
        // ========== FUNCIONES ==========
        
        // Obtener suscriptores desde API de YouTube
        async function fetchSubscriberCount() {
            if (!YOUTUBE_API_KEY || YOUTUBE_API_KEY === "AQUI_VA_TU_API_KEY") {
                // Si no hay API Key, mostrar valor fijo (2.68K)
                document.getElementById("subscriberCount").innerHTML = "2.68K";
                return;
            }
            
            try {
                const response = await fetch(
                    `https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${CHANNEL_ID}&key=${YOUTUBE_API_KEY}`
                );
                const data = await response.json();
                
                if (data.items && data.items[0]) {
                    const count = data.items[0].statistics.subscriberCount;
                    // Formatear número (ej: 2680 -> 2.68K)
                    if (count >= 1000) {
                        document.getElementById("subscriberCount").innerHTML = (count / 1000).toFixed(1) + "K";
                    } else {
                        document.getElementById("subscriberCount").innerHTML = count;
                    }
                } else {
                    document.getElementById("subscriberCount").innerHTML = "2.68K";
                }
            } catch (error) {
                console.error("Error al obtener suscriptores:", error);
                document.getElementById("subscriberCount").innerHTML = "2.68K";
            }
        }
        
        // Obtener últimos videos
        async function fetchLatestVideos() {
            const videoList = document.getElementById("videoList");
            
            if (!YOUTUBE_API_KEY || YOUTUBE_API_KEY === "AQUI_VA_TU_API_KEY") {
                showStaticVideos();
                return;
            }
            
            try {
                const response = await fetch(
                    `https://www.googleapis.com/youtube/v3/search?key=${YOUTUBE_API_KEY}&channelId=${CHANNEL_ID}&part=snippet,id&order=date&maxResults=5`
                );
                const data = await response.json();
                
                if (data.items && data.items.length > 0) {
                    videoList.innerHTML = "";
                    for (const item of data.items) {
                        if (item.id.videoId) {
                            // Obtener estadísticas (vistas) de cada video
                            const statsResponse = await fetch(
                                `https://www.googleapis.com/youtube/v3/videos?part=statistics&id=${item.id.videoId}&key=${YOUTUBE_API_KEY}`
                            );
                            const statsData = await statsResponse.json();
                            const views = statsData.items?.[0]?.statistics?.viewCount || "0";
                            
                            const videoElement = createVideoElement(
                                item.id.videoId,
                                item.snippet.title,
                                item.snippet.publishedAt,
                                item.snippet.thumbnails.medium.url,
                                views
                            );
                            videoList.appendChild(videoElement);
                        }
                    }
                } else {
                    showStaticVideos();
                }
            } catch (error) {
                console.error("Error al obtener videos:", error);
                showStaticVideos();
            }
        }
        
        // Videos estáticos (por si falla la API)
        function showStaticVideos() {
            const videoList = document.getElementById("videoList");
            const staticVideos = [
                { id: "VIDEO_ID_1", title: "¡NADIE sospechaba de MÍ! 🔪 | Murder Mystery 2", date: "15 horas", thumb: "https://img.youtube.com/vi/VIDEO_ID_1/mqdefault.jpg" },
                { id: "VIDEO_ID_2", title: "Mi mejor partida en Murder Mystery 2 🏆💖 | PARTE 2", date: "23 horas", thumb: "https://img.youtube.com/vi/VIDEO_ID_2/mqdefault.jpg" },
                { id: "VIDEO_ID_3", title: "Mi mejor partida en Murder Mystery 2 🏆💖 | PARTE 1", date: "1 mes", thumb: "https://img.youtube.com/vi/VIDEO_ID_3/mqdefault.jpg" }
            ];
            
            videoList.innerHTML = "";
            staticVideos.forEach(video => {
                const videoElement = createVideoElement(video.id, video.title, video.date, video.thumb);
                videoList.appendChild(videoElement);
            });
        }
        
        function createVideoElement(videoId, title, date, thumbnail, views = null) {
            const div = document.createElement("div");
            div.className = "video-item";
            
            let statsText = views ? `👁️ ${parseInt(views).toLocaleString()} vistas` : `📅 ${new Date(date).toLocaleDateString("es-ES")}`;
            
            div.innerHTML = `
                <div class="video-thumb" style="background-image: url('${thumbnail}');"></div>
                <div class="video-info">
                    <div class="video-title">${title.length > 55 ? title.substring(0, 55) + "..." : title}</div>
                    <div class="video-stats">${statsText}</div>
                </div>
            `;
            
            div.addEventListener("click", () => {
                window.open(`https://youtube.com/watch?v=${videoId}`, "_blank");
            });
            
            return div;
        }
        
        // Botón de suscripción
        function setupSubscribeButton() {
            document.getElementById("subscribeBtn").addEventListener("click", () => {
                window.open("https://youtube.com/@LeylaparisX?sub_confirmation=1", "_blank");
            });
        }
        
        // Inicializar
        async function init() {
            setupSubscribeButton();
            await fetchSubscriberCount();
            await fetchLatestVideos();
        }
        
        init();
    </script>
</body>
</html>
